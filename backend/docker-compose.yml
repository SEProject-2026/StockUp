version: '3.8'

services:
  # ==========================================
  # 1. Development Database Environment
  # ==========================================
  db_dev:
    image: postgres:15-alpine
    container_name: stockup_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # Maps the host port defined in .env to the container's internal Postgres port (5432)
      - "${DB_PORT}:5432"
    volumes:
      # Persists development data across container restarts and system reboots
      - postgres_dev_data:/var/lib/postgresql/data

  # ==========================================
  # 2. Testing Database Environment
  # ==========================================
  db_test:
    image: postgres:15-alpine
    container_name: stockup_test_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockup_test
    ports:
      # Maps the testing host port (must be different from DB_PORT) to 5432
      - "5433:5432"
    volumes:
      # Persists testing data (useful for debugging test failures)
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  # Declare named volumes for data persistence
  postgres_dev_data:
  postgres_test_data: