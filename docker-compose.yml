version: '3.8'
services:
  db:
    image: postgres:15
    container_name: stockup_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_DB: stockup_db
      POSTGRES_PASSWORD: 123456
      POSTGRES_HOST_AUTH_METHOD: trust  
    ports:
      - "5499:5432" 
    volumes:
      - postgres_data_v5:/var/lib/postgresql/data

volumes:
  postgres_data_v5: