name: Backend CI

on:
  push:
    branches: 
      - main
      - '*'  
    paths:
      - 'backend/**'
  pull_request:
    branches: 
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stockup_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    defaults:
      run:
        working-directory: ./backend
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 tesseract-ocr tesseract-ocr-heb

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5433/stockup_test
        JWT_SECRET: test_secret_for_ci
        JWT_ALGORITHM: HS256
        JWT_EXPIRES_IN: 60
        ENVIRONMENT: testing
        PYTHONPATH: .
      run: |
        pytest
